<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Babson AI Briefing &middot; Walkthrough</title>
  <meta name="description" content="A walkthrough briefing on three AI providers prepared for the President of Babson College." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Serif:ital,wght@0,400;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="auth.js"></script>
  <style>
    html, body { margin: 0; padding: 0; background: #FAF7F2; min-height: 100vh; font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, sans-serif; color: #14191F; }
    .splash {
      max-width: 480px; margin: 18vh auto 0; padding: 2.4rem 2rem 2rem;
      background: #ffffff; border-radius: 8px; border-top: 4px solid #006747;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.06);
    }
    .splash-eyebrow {
      display: block; font-family: 'IBM Plex Mono', monospace;
      font-size: 0.72rem; font-weight: 600; letter-spacing: 0.08em;
      text-transform: uppercase; color: rgba(20,25,31,0.55);
      margin-bottom: 0.5rem;
    }
    .splash-title {
      font-size: 1.4rem; font-weight: 700; letter-spacing: -0.012em;
      line-height: 1.25; margin: 0 0 0.85rem;
    }
    .splash-body {
      font-family: 'IBM Plex Serif', Georgia, serif;
      font-size: 1rem; line-height: 1.55;
      margin: 0 0 1.3rem;
    }
    .splash-cta {
      display: inline-block;
      padding: 0.6rem 1.2rem;
      background: #006747; color: #fff;
      border: 1px solid #00563C; border-radius: 4px;
      font-weight: 700; font-size: 0.95rem;
      text-decoration: none;
    }
    .splash-cta:hover { background: #00563C; }
    .splash-alt {
      display: block; margin-top: 1rem;
      font-size: 0.86rem;
      color: rgba(20,25,31,0.6); text-decoration: underline;
      text-underline-offset: 3px;
    }
  </style>
</head>
<body>
  <main class="splash">
    <span class="splash-eyebrow">Confidential briefing &middot; May 2026</span>
    <h1 class="splash-title">Empowering Babson&rsquo;s Entrepreneurial Leaders by Providing the Best Tools</h1>
    <p class="splash-body">Redirecting you to the walkthrough&hellip; If your browser doesn&rsquo;t move on its own, tap below.</p>
    <a class="splash-cta" href="./learn/">Open the walkthrough &rarr;</a>
    <a class="splash-alt" href="./brief.html">Or skip straight to the full briefing</a>
  </main>
  <script>
    // Only redirect once unlocked, so the gate isn't navigated away from.
    (function () {
      function tick() {
        try {
          if (localStorage.getItem('babson-ai-brief-unlocked') === 'yes') {
            window.location.replace('./learn/');
            return;
          }
        } catch (e) {}
        setTimeout(tick, 400);
      }
      setTimeout(tick, 200);
    })();
  </script>
</body>
</html>
